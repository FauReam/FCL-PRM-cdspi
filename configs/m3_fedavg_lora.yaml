# M3: FedAvg LoRA fine-tuning
# 4 clients, Pythia 1.4B with LoRA adapters
# Lightweight experiment — 3 days to results, Pareto frontier data.

experiment:
  name: "m3_fedavg_lora_pythia_1b"
  milestone: "M3"
  description: "FedAvg LoRA: Pythia 1.4B, rank=32, 4 clients, 50 rounds"
  seed: 42

model:
  backbone: "EleutherAI/pythia-1.4b"
  prm_head_dim: 256
  freeze_backbone: false
  lora:
    rank: 32
    alpha: 64
    target_modules: ["query_key_value"]
    dropout: 0.1

data:
  dataset: "versaprm"
  data_dir: "./data/versaprm"
  domains: ["math", "code", "medical", "general"]
  samples_per_client: 5000
  max_length: 256

federated:
  num_clients: 4
  num_rounds: 50
  local_epochs: 2
  local_batch_size: 8
  local_learning_rate: 2.0e-4
  aggregation: "fedavg"
  participation_rate: 1.0

training:
  optimizer: "adamw"
  scheduler: "cosine"
  max_grad_norm: 1.0
  log_interval: 5

evaluation:
  eval_every: 5
  eval_split: "val"

logging:
  log_dir: "./experiments/M3_fedavg_lora_prm/results/logs"
  checkpoint_dir: "./experiments/M3_fedavg_lora_prm/results/checkpoints"
  save_every: 10

hardware:
  device: "cuda"
  num_workers: 0
