# M2: Centralized full-parameter FT — Pythia-2.8B (main anchor)
# New baseline: full-parameter fine-tuning on centralized data.
# Replaces the old head-only M2 as the authoritative upper bound.
# Requires NVIDIA GB10 (~40 GB peak) or equivalent.

experiment:
  name: "m2_centralized_full_2.8b"
  milestone: "M2"
  description: "Centralized full-parameter FT: Pythia-2.8B, 3 epochs"
  seed: 42

model:
  backbone: "EleutherAI/pythia-2.8b"
  prm_head_dim: 256
  freeze_backbone: false

data:
  dataset: "prm800k"
  data_dir: "./data/prm800k"
  split: "phase2_train"
  val_split: 0.1
  max_length: 256

training:
  batch_size: 4
  num_epochs: 3
  learning_rate: 3.0e-6
  weight_decay: 0.01
  warmup_steps: 200
  max_grad_norm: 1.0
  optimizer: "adamw"
  scheduler: "cosine"

evaluation:
  eval_every: 500
  eval_batch_size: 4
  metrics: ["accuracy", "f1", "auc"]

logging:
  log_dir: "./experiments/M2_centralized_full_2.8b/results/logs"
  checkpoint_dir: "./experiments/M2_centralized_full_2.8b/results/checkpoints"
  save_every: 1000
  use_wandb: false

hardware:
  device: "cuda"
  num_workers: 0
