# M3-LoRA(r=128): FedAvg LoRA rank=128 — Pythia-1.4B
# Fine-grained capacity sweep around the expected threshold region.
# The expert panel identified rank-128 as potentially near the
# noise-to-structure transition point. Used for EVR vs log(rank)
# piecewise linear regression to locate the threshold.
# P0-2: Capacity continuum core experiment.

experiment:
  name: "m3_fedavg_lora_r128_1.4b"
  milestone: "M3-lora"
  description: "FedAvg LoRA(r=128): Pythia-1.4B, 4 clients, 25 rounds, threshold sweep"
  seed: 42

model:
  backbone: "EleutherAI/pythia-1.4b"
  hidden_dim: 2048
  freeze_backbone: true
  prm_head_dim: 256
  lora:
    r: 128
    alpha: 256
    dropout: 0.05
    target_modules:
      - "query_key_value"
      - "dense"
      - "dense_h_to_4h"
      - "dense_4h_to_h"

data:
  dataset: "versaprm"
  data_dir: "./data/versaprm"
  domains: ["math", "code", "medical", "general"]
  samples_per_client: 5000
  max_length: 384

federated:
  num_clients: 4
  num_rounds: 25
  local_epochs: 1
  local_batch_size: 128
  local_learning_rate: 5.0e-6
  aggregation: "fedavg"
  participation_rate: 1.0

training:
  optimizer: "adamw"
  scheduler: "cosine"
  max_grad_norm: 1.0
  log_interval: 5

evaluation:
  eval_every: 1
  eval_split: "val"
  compute_cd_spi: true
  symmetrical_cd_spi: true

logging:
  log_dir: "./experiments/M3_lora_r128_1.4b/results/logs"
  checkpoint_dir: "./experiments/M3_lora_r128_1.4b/results/checkpoints"
  save_every: 5

hardware:
  device: "cuda"
  num_workers: 4
