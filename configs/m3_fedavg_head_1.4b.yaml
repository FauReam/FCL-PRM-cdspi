# M3-head-only: FedAvg head-only (256-dim MLP, ReLU) — Pythia-1.4B
# Baseline: lowest capacity on the capacity continuum.
# P0-2: Capacity continuum core experiment.

experiment:
  name: "m3_fedavg_head_1.4b"
  milestone: "M3-head"
  description: "FedAvg head-only (ReLU): Pythia-1.4B, 4 clients, 25 rounds"
  seed: 42

model:
  backbone: "EleutherAI/pythia-1.4b"
  hidden_dim: 2048
  freeze_backbone: true
  prm_head_dim: 256

data:
  dataset: "versaprm"
  data_dir: "./data/versaprm"
  domains: ["math", "code", "medical", "general"]
  samples_per_client: 5000
  max_length: 384

federated:
  num_clients: 4
  num_rounds: 25
  local_epochs: 1
  local_batch_size: 128
  local_learning_rate: 1.0e-4
  aggregation: "fedavg"
  participation_rate: 1.0

training:
  optimizer: "adamw"
  scheduler: "cosine"
  max_grad_norm: 1.0
  log_interval: 5

evaluation:
  eval_every: 1
  eval_split: "val"
  compute_cd_spi: true
  symmetrical_cd_spi: true

logging:
  log_dir: "./experiments/M3_head_1.4b/results/logs"
  checkpoint_dir: "./experiments/M3_head_1.4b/results/checkpoints"
  save_every: 5

hardware:
  device: "cuda"
  num_workers: 4
