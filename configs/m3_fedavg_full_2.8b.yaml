# M3: FedAvg full-parameter FT — Pythia-2.8B (main experiment)
# The core claim: full-parameter FT beats head-only FedAvg.
# 4 clients, 25 rounds, 1 local epoch each.
# Requires NVIDIA GB10 (~40 GB peak).

experiment:
  name: "m3_fedavg_full_2.8b"
  milestone: "M3"
  description: "FedAvg full-parameter FT: Pythia-2.8B, 4 clients, 25 rounds"
  seed: 42

model:
  backbone: "EleutherAI/pythia-2.8b"
  prm_head_dim: 256
  freeze_backbone: false

data:
  dataset: "versaprm"
  data_dir: "./data/versaprm"
  domains: ["math", "code", "medical", "general"]
  samples_per_client: 5000
  max_length: 256

federated:
  num_clients: 4
  num_rounds: 25
  local_epochs: 1
  local_batch_size: 4
  local_learning_rate: 3.0e-6
  aggregation: "fedavg"
  participation_rate: 1.0

training:
  optimizer: "adamw"
  scheduler: "cosine"
  max_grad_norm: 1.0
  log_interval: 5

evaluation:
  eval_every: 1
  eval_split: "val"

logging:
  log_dir: "./experiments/M3_fedavg_full_2.8b/results/logs"
  checkpoint_dir: "./experiments/M3_fedavg_full_2.8b/results/checkpoints"
  save_every: 5

hardware:
  device: "cuda"
  num_workers: 0
