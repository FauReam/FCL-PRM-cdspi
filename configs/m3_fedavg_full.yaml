# M3: FedAvg full-parameter fine-tuning
# 4 clients, Pythia 1.4B, all backbone params trainable
# This is the core experiment: does full-parameter FT beat head-only FedAvg?
# Requires NVIDIA GB10 (~21 GB peak) or equivalent unified-memory device.

experiment:
  name: "m3_fedavg_full_pythia_1b"
  milestone: "M3"
  description: "FedAvg full-parameter FT: Pythia 1.4B, 4 clients, 50 rounds"
  seed: 42

model:
  backbone: "EleutherAI/pythia-1.4b"
  prm_head_dim: 256
  freeze_backbone: false

data:
  dataset: "versaprm"
  data_dir: "./data/versaprm"
  domains: ["math", "code", "medical", "general"]
  samples_per_client: 5000
  max_length: 256

federated:
  num_clients: 4
  num_rounds: 25
  local_epochs: 1
  local_batch_size: 4
  local_learning_rate: 5.0e-6
  aggregation: "fedavg"
  participation_rate: 1.0

training:
  optimizer: "adamw"
  scheduler: "cosine"
  max_grad_norm: 1.0
  log_interval: 5

evaluation:
  eval_every: 1
  eval_split: "val"

logging:
  log_dir: "./experiments/M3_fedavg_full_prm/results/logs"
  checkpoint_dir: "./experiments/M3_fedavg_full_prm/results/checkpoints"
  save_every: 5

hardware:
  device: "cuda"
  num_workers: 0
