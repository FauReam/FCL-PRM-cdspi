# M3-full: FedAvg full-parameter FT (standard ReLU head) — Pythia-1.4B
# Highest capacity on the continuum. All backbone + PRM head trainable.
# P0-2: Capacity continuum core experiment.

experiment:
  name: "m3_fedavg_full_1.4b"
  milestone: "M3-full"
  description: "FedAvg full-parameter FT: Pythia-1.4B, 4 clients, 25 rounds"
  seed: 42

model:
  backbone: "EleutherAI/pythia-1.4b"
  hidden_dim: 2048
  freeze_backbone: false
  prm_head_dim: 256

data:
  dataset: "versaprm"
  data_dir: "./data/versaprm"
  domains: ["math", "code", "medical", "general"]
  samples_per_client: 5000
  max_length: 384

federated:
  num_clients: 4
  num_rounds: 25
  local_epochs: 1
  local_batch_size: 4
  local_learning_rate: 5.0e-6
  aggregation: "fedavg"
  participation_rate: 1.0

training:
  optimizer: "adamw"
  scheduler: "cosine"
  max_grad_norm: 1.0
  log_interval: 5

evaluation:
  eval_every: 1
  eval_split: "val"
  compute_cd_spi: true
  symmetrical_cd_spi: true

logging:
  log_dir: "./experiments/M3_full_1.4b/results/logs"
  checkpoint_dir: "./experiments/M3_full_1.4b/results/checkpoints"
  save_every: 5

hardware:
  device: "cuda"
  num_workers: 4
