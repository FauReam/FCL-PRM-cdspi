# M2-AttnRes: Centralized full-parameter FT with Block AttnRes — Pythia-1.4B
# Block Attention Residuals replace standard PreNorm residuals with learned
# softmax attention over block-level representations (N=8 blocks).
# Reference: "Attention Residuals" (arXiv:2603.15031, Kimi Team, 2026)
#
# Primary comparison: M2 full-parameter baseline vs M2 + AttnRes.
# Tests whether AttnRes improves PRM accuracy on step-level reward modeling,
# particularly on multi-step reasoning tasks (math, code).
#
# Requires NVIDIA GB10 (~21 GB peak + ~2 MB for pseudo-queries).

experiment:
  name: "m2_centralized_full_1.4b_attnres"
  milestone: "M2"
  description: "Centralized full-parameter FT: Pythia-1.4B + Block AttnRes, 3 epochs"
  seed: 42

model:
  backbone: "EleutherAI/pythia-1.4b"
  prm_head_dim: 256
  freeze_backbone: false
  # ---- Block Attention Residuals ----
  # Enables AttnRes with N=8 blocks (3 transformer layers per block).
  # The token embedding + 8 blocks = 9 depth-wise attention sources.
  # Pseudo-queries (2*24*2048 ≈ 98K params) are trained end-to-end.
  attnres:
    num_blocks: 8
    zero_init: true

data:
  dataset: "prm800k"
  data_dir: "./data/prm800k"
  split: "phase2_train"
  val_split: 0.1
  max_length: 256

training:
  batch_size: 4
  num_epochs: 3
  learning_rate: 5.0e-6
  weight_decay: 0.01
  warmup_steps: 200
  max_grad_norm: 1.0
  optimizer: "adamw"
  scheduler: "cosine"

evaluation:
  eval_every: 500
  eval_batch_size: 4
  metrics: ["accuracy", "f1", "auc"]

logging:
  log_dir: "./experiments/M2_centralized_full_1.4b_attnres/results/logs"
  checkpoint_dir: "./experiments/M2_centralized_full_1.4b_attnres/results/checkpoints"
  save_every: 1000
  use_wandb: false

hardware:
  device: "cuda"
  num_workers: 0
