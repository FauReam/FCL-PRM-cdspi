# M3-PartialFT: FedAvg partial-FT (last 2 layers) — Pythia-1.4B
# Unfreezes only the last 2 transformer layers + PRM head.
# This sits between LoRA(r=256) and full-FT on the capacity continuum.
#
# Partial FT is a natural baseline: if unfreezing just the top layers
# achieves most of full-FT's benefit, it suggests the capacity bottleneck
# is localised in the final representations rather than distributed.

experiment:
  name: "m3_fedavg_partialft_1.4b"
  milestone: "M3-partial"
  description: "FedAvg partial-FT (last 2 layers): Pythia-1.4B, 4 clients, 25 rounds"
  seed: 42

model:
  backbone: "EleutherAI/pythia-1.4b"
  hidden_dim: 2048
  num_layers: 24
  freeze_backbone: true
  prm_head_dim: 256
  partial_ft_layers: 2

data:
  dataset: "versaprm"
  data_dir: "./data/versaprm"
  domains: ["math", "code", "medical", "general"]
  samples_per_client: 5000
  max_length: 256

federated:
  num_clients: 4
  num_rounds: 25
  local_epochs: 1
  local_batch_size: 4
  local_learning_rate: 5.0e-6
  aggregation: "fedavg"
  participation_rate: 1.0

training:
  optimizer: "adamw"
  scheduler: "cosine"
  max_grad_norm: 1.0
  log_interval: 5

evaluation:
  eval_every: 1
  eval_split: "val"
  compute_cd_spi: true

logging:
  log_dir: "./experiments/M3_partialft_1.4b/results/logs"
  checkpoint_dir: "./experiments/M3_partialft_1.4b/results/checkpoints"
  save_every: 5

hardware:
  device: "cuda"
  num_workers: 0
